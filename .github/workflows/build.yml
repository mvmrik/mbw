name: Build MBW App

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller sps.spec

      - name: Rename output
        run: move dist\SPS.exe dist\MyBitcoinWorld.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MBW-Windows
          path: dist/MyBitcoinWorld.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller sps.spec

      - name: Zip macOS app
        run: |
          cd dist
          zip -r MyBitcoinWorld-macOS.zip SPS.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MBW-macOS
          path: dist/MyBitcoinWorld-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev libfuse2 wget

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller sps.spec

      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy the PyInstaller binary
          cp dist/SPS AppDir/usr/bin/MyBitcoinWorld
          chmod +x AppDir/usr/bin/MyBitcoinWorld

          # Copy icon
          cp mbw.png AppDir/usr/share/icons/hicolor/256x256/apps/mybitcoinworld.png
          cp mbw.png AppDir/mybitcoinworld.png

          # Desktop file
          cat > AppDir/usr/share/applications/mybitcoinworld.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=My Bitcoin World
          Exec=MyBitcoinWorld
          Icon=mybitcoinworld
          Type=Application
          Categories=Finance;
          Comment=Bitcoin portfolio and seed phrase storage
          DESKTOP

          cp AppDir/usr/share/applications/mybitcoinworld.desktop AppDir/mybitcoinworld.desktop

          # AppRun script
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/MyBitcoinWorld" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Build AppImage (no FUSE needed with --appimage-extract-and-run)
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir MyBitcoinWorld-Linux.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: MBW-Linux
          path: MyBitcoinWorld-Linux.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MBW-Windows/MyBitcoinWorld.exe
            MBW-macOS/MyBitcoinWorld-macOS.zip
            MBW-Linux/MyBitcoinWorld-Linux.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
